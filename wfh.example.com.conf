server {
    listen 80;
    listen [::]:80;
    server_name wfh.example.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wfh.example.com;

    # SSL — replace with your actual cert paths (e.g. Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/wfh.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wfh.example.com/privkey.pem;

    # Proxy to Flask
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
